<!DOCTYPE html>
<html lang="en">
<div class="pet-profile">
  @if (selectedPet) {
    <h2>{{ selectedPet.name }}</h2>
    <p class="species">{{ selectedPet.species }} - {{ selectedPet.breed }}</p>
    <p><strong>Age:</strong> {{ selectedPet.age }}</p>
    <p><strong>Location:</strong> {{ selectedPet.location }}</p>
    <p class="description">{{ selectedPet.description }}</p>

    <div class="actions">
      <button class="btn adopt">Adopt</button>
      <button class="btn contact">Contact</button>
    </div>
  } @else {
    <p>Pet not found.</p>
  }
</div>


</html>
