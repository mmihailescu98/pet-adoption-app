<div class="pet-profile">
  @if ((status$ | async) === 'loading') {
    <p>Loading...</p>
  } @else {
    @if (error$ | async) {
      <p>Pet not found.</p>
    } @else {
      @if (pet$ | async; as pet) {
        <div class="pet-container">
          <!-- Add image section -->
          <div class="pet-image">
            <img [src]="pet.imgURL" alt="{{ pet.name }}">
          </div>
          
          <div class="pet-info">
            <h2>{{ pet.name }}</h2>
            <p class="species">{{ pet.species }} - {{ pet.breed }}</p>
            <p class="pet-detail"><strong>Age:</strong> {{ pet.age }}</p>
            <p class="pet-detail"><strong>Location:</strong> {{ pet.location }}</p>
            <p class="description">{{ pet.description }}</p>
            
            <div class="actions">
              <button class="btn adopt">Adopt</button>
              <button class="btn contact">Contact</button>
            </div>
          </div>
        </div>
      }
    }
  }
</div>
